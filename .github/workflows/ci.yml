name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql+asyncpg://serverless:serverless@localhost:5432/serverless
  REDIS_URL: redis://localhost:6379/0

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --constraint requirements/constraints.txt -e ".[test,worker,dev]"
      - run: ruff check backend worker benchmarks tests
      - run: mypy backend/app worker/app benchmarks
      - run: python -m compileall -q backend worker runtime benchmarks tests
      - run: docker compose config --quiet

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: serverless
          POSTGRES_USER: serverless
          POSTGRES_PASSWORD: serverless
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --constraint requirements/constraints.txt -e ".[test]"
      - run: alembic upgrade head
      - run: alembic check
      - run: pytest -m "not integration and not docker"
      - run: pytest tests/integration/test_postgres_redis.py -m integration
        env:
          RUN_INTEGRATION_TESTS: "1"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --constraint requirements/constraints.txt -e ".[test]"
      - run: docker compose build runtime-image api worker frontend
      - run: pytest tests/integration/test_runtime_container.py -m docker
        env:
          RUN_DOCKER_TESTS: "1"
      - run: docker compose up --build --detach
      - run: pytest tests/e2e/test_compose_workflows.py -m e2e
        env:
          RUN_E2E_TESTS: "1"
      - name: Show Compose state and logs
        if: failure()
        run: |
          docker compose ps --all
          docker compose logs --no-color
      - name: Stop Compose stack
        if: always()
        run: |
          docker compose down --volumes --remove-orphans
          runtime_containers="$(docker ps --all --quiet --filter label=serverless.platform.runtime=true)"
          if [ -n "$runtime_containers" ]; then
            docker rm --force $runtime_containers
          fi
