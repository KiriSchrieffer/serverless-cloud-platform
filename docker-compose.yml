services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: serverless
      POSTGRES_USER: serverless
      POSTGRES_PASSWORD: serverless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serverless -d serverless"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  runtime-image:
    image: serverless-python311-runtime:latest
    build:
      context: .
      dockerfile: runtime/python311/Dockerfile
    entrypoint: ["/bin/true"]

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  dispatcher:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.example
    command: ["python", "-m", "backend.app.dispatcher"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env.example
    environment:
      WORKSPACE_ROOT: ${PWD}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      runtime-image:
        condition: service_completed_successfully
    volumes:
      - ./storage:/app/storage
      - "${PWD}:${PWD}"
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
